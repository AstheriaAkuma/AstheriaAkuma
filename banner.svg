<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <style>
      .name {
        font-family: Georgia, serif;
        font-size: 48px;
        font-weight: 700;
        fill: #ffffff;
        opacity: 0;
        animation: fadeUp 0.8s ease 0.2s forwards;
      }
      .role {
        font-family: Georgia, serif;
        font-size: 18px;
        fill: #aaaaaa;
        letter-spacing: 3px;
        opacity: 0;
        animation: fadeUp 0.8s ease 0.6s forwards;
      }
      .tagline {
        font-family: Georgia, serif;
        font-size: 13px;
        fill: #666666;
        letter-spacing: 1.5px;
        opacity: 0;
        animation: fadeUp 0.8s ease 1s forwards;
      }
      .line {
        stroke: #ffffff;
        stroke-opacity: 0.15;
        stroke-width: 1;
        opacity: 0;
        animation: fadeIn 1s ease 0.4s forwards;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
  <!-- Subtle sheen -->
  <rect width="900" height="200" fill="url(#accent)" rx="12"/>
  <!-- Bottom wave strip -->
  <path d="M0,170 Q225,155 450,165 Q675,175 900,160 L900,200 L0,200 Z" fill="#ffffff" fill-opacity="0.03"/>

  <!-- Content -->
  <text class="name" x="450" y="96" text-anchor="middle">Hi, I'm Nathalia 🖤</text>
  <line class="line" x1="320" y1="114" x2="580" y2="114"/>
  <text class="role" x="450" y="138" text-anchor="middle">UI/UX DESIGNER &amp; DEVELOPER</text>
  <text class="tagline" x="450" y="162" text-anchor="middle">Bold design choices, grounded in usability.</text>
</svg>
