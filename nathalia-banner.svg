<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nebula1" cx="25%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#3b1f6e;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#1a1060;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#4a1060;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <style>
      .name {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 46px;
        font-weight: 700;
        fill: #ffffff;
        opacity: 0;
        animation: fadeUp 0.9s ease 0.3s forwards;
      }
      .role {
        font-family: Georgia, serif;
        font-size: 15px;
        fill: #c4b5fd;
        letter-spacing: 4px;
        text-transform: uppercase;
        opacity: 0;
        animation: fadeUp 0.9s ease 0.7s forwards;
      }
      .tagline {
        font-family: Georgia, serif;
        font-size: 12px;
        fill: #7c6fa0;
        letter-spacing: 1.5px;
        opacity: 0;
        animation: fadeUp 0.9s ease 1.1s forwards;
      }
      .divider {
        stroke: #7c3aed;
        stroke-opacity: 0.5;
        stroke-width: 1;
        opacity: 0;
        animation: expandLine 0.8s ease 0.6s forwards;
      }
      .star { animation: twinkle var(--d) ease-in-out var(--delay) infinite alternate; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes expandLine {
        from { opacity: 0; stroke-dashoffset: 200; }
        to   { opacity: 1; stroke-dashoffset: 0; }
      }
      @keyframes twinkle {
        from { opacity: var(--min); }
        to   { opacity: var(--max); }
      }
    </style>
  </defs>

  <!-- Deep space base -->
  <rect width="900" height="200" fill="#07071a" rx="12"/>

  <!-- Nebula clouds -->
  <rect width="900" height="200" fill="url(#nebula1)" rx="12"/>
  <rect width="900" height="200" fill="url(#nebula2)" rx="12"/>
  <rect width="900" height="200" fill="url(#nebula3)" rx="12"/>
  <rect width="900" height="200" fill="url(#glow)" rx="12"/>

  <!-- Soft nebula wisps -->
  <ellipse cx="200" cy="90" rx="160" ry="60" fill="#6d28d9" fill-opacity="0.08" filter="url(#blur1)"/>
  <ellipse cx="700" cy="110" rx="140" ry="55" fill="#4c1d95" fill-opacity="0.1" filter="url(#blur1)"/>
  <ellipse cx="450" cy="50" rx="200" ry="40" fill="#7c3aed" fill-opacity="0.06" filter="url(#blur1)"/>

  <!-- Stars — large glowing -->
  <circle cx="55"  cy="22"  r="1.5" fill="#fff" fill-opacity="0.9" filter="url(#blur2)" class="star" style="--d:3.1s;--delay:0s;--min:0.3;--max:1"/>
  <circle cx="820" cy="18"  r="1.8" fill="#fff" fill-opacity="0.9" filter="url(#blur2)" class="star" style="--d:2.7s;--delay:0.4s;--min:0.2;--max:0.9"/>
  <circle cx="870" cy="55"  r="1.2" fill="#c4b5fd" fill-opacity="0.9" filter="url(#blur2)" class="star" style="--d:4s;--delay:1s;--min:0.4;--max:1"/>
  <circle cx="30"  cy="140" r="1.4" fill="#fff" fill-opacity="0.8" filter="url(#blur2)" class="star" style="--d:3.5s;--delay:0.2s;--min:0.3;--max:0.9"/>
  <circle cx="880" cy="160" r="1.6" fill="#ddd6fe" fill-opacity="0.9" filter="url(#blur2)" class="star" style="--d:2.9s;--delay:0.8s;--min:0.3;--max:1"/>
  <circle cx="140" cy="170" r="1.3" fill="#fff" fill-opacity="0.7" filter="url(#blur2)" class="star" style="--d:3.8s;--delay:1.5s;--min:0.2;--max:0.8"/>
  <circle cx="760" cy="175" r="1.5" fill="#c4b5fd" fill-opacity="0.8" filter="url(#blur2)" class="star" style="--d:3.3s;--delay:0.6s;--min:0.3;--max:1"/>

  <!-- Stars — small scattered -->
  <circle cx="80"  cy="60"  r="0.8" fill="#fff" fill-opacity="0.6" class="star" style="--d:4.2s;--delay:0.3s;--min:0.2;--max:0.8"/>
  <circle cx="150" cy="30"  r="0.7" fill="#fff" fill-opacity="0.5" class="star" style="--d:3.6s;--delay:1.2s;--min:0.1;--max:0.7"/>
  <circle cx="250" cy="15"  r="0.9" fill="#e9d5ff" fill-opacity="0.6" class="star" style="--d:2.8s;--delay:0.7s;--min:0.2;--max:0.8"/>
  <circle cx="340" cy="28"  r="0.6" fill="#fff" fill-opacity="0.5" class="star" style="--d:4.5s;--delay:1.8s;--min:0.1;--max:0.6"/>
  <circle cx="420" cy="12"  r="0.8" fill="#fff" fill-opacity="0.6" class="star" style="--d:3.2s;--delay:0.5s;--min:0.2;--max:0.8"/>
  <circle cx="500" cy="22"  r="0.7" fill="#ddd6fe" fill-opacity="0.5" class="star" style="--d:3.9s;--delay:2s;--min:0.1;--max:0.7"/>
  <circle cx="580" cy="10"  r="0.9" fill="#fff" fill-opacity="0.6" class="star" style="--d:4.1s;--delay:0.9s;--min:0.2;--max:0.8"/>
  <circle cx="650" cy="30"  r="0.6" fill="#fff" fill-opacity="0.4" class="star" style="--d:3.4s;--delay:1.6s;--min:0.1;--max:0.6"/>
  <circle cx="730" cy="18"  r="0.8" fill="#c4b5fd" fill-opacity="0.6" class="star" style="--d:2.6s;--delay:0.1s;--min:0.3;--max:0.9"/>
  <circle cx="110" cy="105" r="0.7" fill="#fff" fill-opacity="0.4" class="star" style="--d:4.3s;--delay:1.3s;--min:0.1;--max:0.6"/>
  <circle cx="790" cy="80"  r="0.8" fill="#fff" fill-opacity="0.5" class="star" style="--d:3.7s;--delay:0.4s;--min:0.2;--max:0.7"/>
  <circle cx="845" cy="100" r="0.6" fill="#e9d5ff" fill-opacity="0.5" class="star" style="--d:4.8s;--delay:2.2s;--min:0.1;--max:0.6"/>
  <circle cx="60"  cy="180" r="0.7" fill="#fff" fill-opacity="0.4" class="star" style="--d:3.0s;--delay:1.1s;--min:0.1;--max:0.6"/>
  <circle cx="200" cy="188" r="0.8" fill="#fff" fill-opacity="0.5" class="star" style="--d:4.6s;--delay:0.6s;--min:0.2;--max:0.7"/>
  <circle cx="380" cy="182" r="0.6" fill="#ddd6fe" fill-opacity="0.4" class="star" style="--d:3.1s;--delay:1.9s;--min:0.1;--max:0.6"/>
  <circle cx="600" cy="190" r="0.7" fill="#fff" fill-opacity="0.4" class="star" style="--d:4.4s;--delay:0.8s;--min:0.1;--max:0.6"/>

  <!-- Text content -->
  <text class="name" x="450" y="96" text-anchor="middle">Hi, I'm Nathalia 🖤</text>
  <line class="divider" x1="310" y1="112" x2="590" y2="112" stroke-dasharray="280" stroke-dashoffset="280"/>
  <text class="role" x="450" y="136" text-anchor="middle">UI/UX Designer &amp; Developer</text>
  <text class="tagline" x="450" y="160" text-anchor="middle">Bold design choices, grounded in usability.</text>
</svg>
